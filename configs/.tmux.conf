# Reduce escape delay (default 500ms makes vim sluggish)
set -sg escape-time 10

# Enable mouse (scroll, click to select pane, resize)
set -g mouse on

# Increase scrollback buffer (default 2000 is too low for training logs)
set -g history-limit 50000

# Enable OSC 52 clipboard: tmux copy syncs to local Mac clipboard over SSH
set -g set-clipboard on
